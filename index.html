<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0 minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Editor Test</title>
        <link rel="stylesheet" href="res/editor.css">

        <script src="https://kit.fontawesome.com/cb36336f7b.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="editor-c" style="display: flex; flex-direction: row"></div>
        <div class="editor-c2"></div>
        <script type="module">
            import {TextRange} from "./src/editor/core/coordinate/TextRange";
            import {SerializationUtils} from "./src/editor/core/serializable/SerializationUtils";
            import {JsLexicalGrammar} from "./src/plugins/jsLang/lang/lexer/JsLexicalGrammar";
            import {RegExpLexer} from "./src/core/lang/syntax/builder/lexer/RegExprLexer";
            import {JsGrammar} from "./src/plugins/jsLang/lang/parser/JsGrammar";
            import {JsParser} from "./src/plugins/jsLang/lang/parser/JsParser";
            import JSLangPlugin from "./src/plugins/jsLang/JSLangPlugin";
            import JsIncrLexer from "./src/plugins/jsLang/lang/lexer/JsIncrLexer";
            import {Source} from "./src/core/lang/syntax/builder/tokens/TokenStream";
            import {DocumentModificationEvent} from "./src/editor/core/document/events/DocumentModificationEvent";
            import {InlineError} from "./src/editor/ui/inline/error/InlineError";
            import {Workspace} from "./src/core/workspace/Workspace";
            import {ASTBuilder} from "./src/core/lang/syntax/builder/parser/builder/ASTBuilder";
            import {ShadowApp} from "./src/app/ShadowApp";
            import {RelativePath} from "./src/core/workspace/filesystem/path/RelativePath";
            import {EditorURI} from "./src/core/uri/EditorURI";
            import {JsCodeBlock} from "./src/plugins/jsLang/lang/syntax/JsCodeBlock";
            import {JsDeclarator} from "./src/plugins/jsLang/lang/syntax/statements/JsDeclarator";
            import {JsIdentifier} from "./src/plugins/jsLang/lang/syntax/expr/JsIdentifier";
            import {GlobalState} from "./src/core/global/GlobalState";
            import {ShadowUIFactory} from "./src/app/ui/ShadowUIFactory";
            import {SyncService} from "./src/core/sync/sync/SyncService";
            import {CommonKeyImpl} from "./src/core/utils/CommonKey";
            import {WorkspaceChooserPane} from "./src/app/ui/full/panes/workspaceChooser/WorkspaceChooserPane";
            import {BlankPane} from "./src/app/ui/full/panes/blank/BlankPane";
            import {EditorTab} from "./src/app/ui/tabs/tab/EditorTab";
            import JsLang from "./src/plugins/jsLang/lang/JsLang";
            import {Document} from "./src/editor/core/document/Document";

            // Main entry point - launch the app and wait for startup to complete
            const app = await ShadowApp.launch(true);
            window.app = app;


            window.GlobalState = GlobalState;

            SyncService.getInstance();

            if (!app) {
                console.error("ShadowApp startup failed!");
            } else {
                // App is now fully initialized, safe to create workspace and editor
                const workspace = new Workspace("myProject");

                app.openProject(workspace);

                // ShadowUIFactory.singleEditorUI(workspace, () => document.querySelector(".editor-c"));
                window.ui = await ShadowUIFactory.fullAppUI();

                app.enable(JSLangPlugin.class);

                window.CommonKeyImpl = CommonKeyImpl;
                window.WorkspacePane = WorkspaceChooserPane;
                window.BlankPane = BlankPane;

                window.EditorTab = EditorTab;
                window.TM = GlobalState.getTabsManager();

                setTimeout(() => {
                    GlobalState.getPaneManager().open(new WorkspaceChooserPane());
                    GlobalState.getPaneManager().open(new BlankPane());
                }, 0);

                window.editor = ui.getMainEditor();

                window.workspace = workspace;
                window.TextRange = TextRange;
                window.SerializationUtils = SerializationUtils;

                window.EDoc = Document;
                window.JsLangPlugin = JSLangPlugin.class;
                window.JsLang = JsLang;

                window.JsGr = JsLexicalGrammar;
                window.RegLex = RegExpLexer;
                window.JsLex = new RegLex(JsGr);
                window.JsIncrLex = JsIncrLexer;
                window.DocumentModificationEvent = DocumentModificationEvent;

                window.lex = new JsIncrLex();

                window.InError = InlineError;

                window.Source = Source;

                window.builder = ASTBuilder;

                window.JsAst = JsGrammar;

                window.JsCodeBlock = JsCodeBlock;
                window.JsDeclarator = JsDeclarator;
                window.JsIdentifier = JsIdentifier;

                window.Parser = JsParser;

                window.RelativePath = RelativePath;

                window.EditorURI = EditorURI;

                window.GlobalState = GlobalState;

                window.fill = (n = 1000) => {
                    let s = "";
                    for (let i = 0; i < n; i++) {
                        s += "let x = " + i + ";\n";
                    }
                    editor.insertText(0, s);
                }
            }

            // window.s = `import {IncrementalLexer} from "../../../../editor/lang/lexer/IncrementalLexer";\nimport {Token} from "../../../../editor/lang/tokens/Token";\nimport {Source} from "../../../../editor/lang/tokens/TokenStream";\nimport {JsLexicalGrammar} from "./JsLexicalGrammar";\nimport {TokenType} from "../../../../editor/lang/tokens/TokenType";\nimport {TextRange} from "../../../../editor/core/coordinate/TextRange";\n\nexport default class JsIncrLexer extends IncrementalLexer {\n    tokenize(input: Source): Token {\n        // If at end of input\n        if (input.isEmpty()) {\n            return new Token(TokenType.EOF, "", new TextRange(input.getOffset(), input.getOffset()));\n        }\n\n        const start = input.getOffset();\n        let ch = input.seek()!;\n\n        // --- Whitespace ---\n        if (ch === \' \' || ch === \'\t\') {\n            let value = "";\n            while (ch === \' \' || ch === \'\t\') {\n                value += input.consume();\n                ch = input.seek()!;\n            }\n            return new Token(JsLexicalGrammar.WHITESPACE, value, input.getRange(start));\n        }\n\n        // --- End of line ---\n        if (ch === \'\n\' || ch === \'\r\') {\n            let value = input.consume()!;\n            // Handle Windows-style \r\n\n            if (ch === \'\r\' && input.seek() === \'\n\') {\n                value += input.consume()!;\n            }\n            return new Token(JsLexicalGrammar.EOL, value, input.getRange(start));\n        }\n\n        // --- Comments ---\n        if (ch === \'/\') {\n            const next = input.seekNext();\n            if (next === \'/\') {\n                // single line comment\n                let value = input.consume()! + input.consume()!;\n                while (!input.isEmpty() && input.seek() !== \'\n\' && input.seek() !== \'\r\') {\n                    value += input.consume();\n                }\n                return new Token(JsLexicalGrammar.SINGLE_LINE_COMMENT, value, input.getRange(start));\n            }\n            if (next === \'*\') {\n                // multi-line comment\n                let value = input.consume()! + input.consume()!;\n                while (!input.isEmpty()) {\n                    const c = input.consume()!;\n                    value += c;\n                    if (c === \'*\' && input.seek() === \'/\') {\n                        value += input.consume();\n                        break;\n                    }\n                }\n                return new Token(JsLexicalGrammar.MULTI_LINE_COMMENT, value, input.getRange(start));\n            }\n        }\n\n        // --- String literals ---\n        if (ch === \'"\' || ch === "\'" || ch === \'\`\\') {\n            const quote = input.consume()!;\n            let value = quote;\n            while (!input.isEmpty()) {\n                const c = input.consume()!;\n                value += c;\n                if (c === \'\\\') {\n                    // escape next character\n                    value += input.consume() || "";\n                } else if (c === quote) {\n                    break;\n                } else if (c === "\n" || c === "\r") {\n                    if (ch !== \'\`\\') break;\n                }\n            }\n            const type =\n                quote === \'\`\'\n                    ? JsLexicalGrammar.TEMPLATE_STRING\n                    : JsLexicalGrammar.STRING_LITERAL;\n            return new Token(type, value, input.getRange(start));\n        }\n\n        // --- Numbers ---\n        if (/[0-9]/.test(ch)) {\n            let value = input.consume()!;\n            ch = input.seek()!;\n            if (value === "0" && (ch === "x" || ch === "X" || ch === "b" || ch === "B" || ch === "o" || ch === "O")) {\n                value += input.consume();\n                while (/[0-9a-fA-F]/.test(input.seek() || "")) {\n                    value += input.consume();\n                }\n            } else {\n                while (/[0-9_.eE+-]/.test(input.seek() || "")) {\n                    value += input.consume();\n                }\n            }\n            return new Token(JsLexicalGrammar.NUMBER_LITERAL, value, input.getRange(start));\n        }\n\n        // --- Identifiers / Keywords ---\n        if (/[$A-Za-z_]/.test(ch)) {\n            let value = input.consume()!;\n            while (/[$\\w]/.test(input.seek() || "")) {\n                value += input.consume();\n            }\n\n            const isKeyword = JsLexicalGrammar.KEYWORD_LIST.includes(value);\n            const type = isKeyword\n                ? JsLexicalGrammar.KEYWORD\n                : JsLexicalGrammar.IDENTIFIER;\n            return new Token(type, value, input.getRange(start));\n        }\n\n        // --- Operators & punctuation ---\n        let c1 = input.consume()!;\n        let c2 = input.seek() || "";\n        let c3 = input.seekNext() || "";\n        let triple = c1 + c2 + c3;\n        let double = c1 + c2;\n\n        // ELLIPSIS\n        if (triple === "...") {\n            input.jump(2);\n            return new Token(JsLexicalGrammar.ELLIPSIS, "...", input.getRange(start));\n        }\n\n        // ===\n        if (triple === "===" || triple === "!==") {\n            input.jump(2);\n            return new Token(JsLexicalGrammar.COMPARISON_OPERATOR, triple, input.getRange(start));\n        }\n\n        // DOT or ?.\n        if (c1 === ".") {\n            if (c2 === "?") {\n                c1 += "?";\n                input.jump(1);\n            }\n            return new Token(JsLexicalGrammar.DOT, c1, input.getRange(start));\n        }\n\n        // Single-character tokens (brackets, etc.)\n        const singleMap: Record<string, any> = {\n            "(": JsLexicalGrammar.LPAREN,\n            ")": JsLexicalGrammar.RPAREN,\n            "{": JsLexicalGrammar.LBRACE,\n            "}": JsLexicalGrammar.RBRACE,\n            "[": JsLexicalGrammar.LBRACKET,\n            "]": JsLexicalGrammar.RBRACKET,\n            ";": JsLexicalGrammar.SEMICOLON,\n            ",": JsLexicalGrammar.COMMA,\n            ":": JsLexicalGrammar.COLON,\n            "?": JsLexicalGrammar.QUESTION_MARK,\n            "#": JsLexicalGrammar.HASHTAG\n        };\n        if (singleMap[c1]) {\n            return new Token(singleMap[c1], c1, input.getRange(start));\n        }\n\n        switch (double) {\n            case "++":\n            case "--":\n                input.jump(1);\n                return new Token(JsLexicalGrammar.POSTFIX_OPERATOR, double, input.getRange(start))\n            case "=>":\n                input.jump(1);\n                return new Token(JsLexicalGrammar.ARROW, "=>", input.getRange(start));\n            case "==":\n            case ">=":\n            case "!=":\n            case "<=":\n                input.jump(1);\n                return new Token(JsLexicalGrammar.COMPARISON_OPERATOR, double, input.getRange(start));\n            case "+=":\n            case "-=":\n            case "*=":\n            case "/=":\n            case "%=":\n            case "&=":\n            case "|=":\n            case "^=":\n                input.jump(1);\n                return new Token(JsLexicalGrammar.ASSIGNMENT_OPERATOR, double, input.getRange(start));\n            case "&&":\n            case "||":\n            case "??":\n                input.jump(1);\n                if (c3 === "=") {\n                    input.jump(1);\n                    return new Token(JsLexicalGrammar.ASSIGNMENT_OPERATOR, triple, input.getRange(start));\n                }\n                return new Token(JsLexicalGrammar.LOGICAL_OPERATOR, double, input.getRange(start));\n            case ">>":\n            case "<<":\n                input.jump(1);\n                if (triple === ">>>") {\n                    input.jump(1);\n                    double += ">";\n                    c3 = input.seek() || "";\n                }\n                if (c3 === "=") {\n                    input.jump(1);\n                    return new Token(JsLexicalGrammar.ASSIGNMENT_OPERATOR, double + "=", input.getRange(start));\n                }\n                return new Token(JsLexicalGrammar.BITWISE_OPERATOR, double, input.getRange(start));\n            case "**":\n                input.jump(1);\n                return new Token(JsLexicalGrammar.MATHEMATICAL_OPERATOR, double, input.getRange(start));\n        }\n\n        switch (c1) {\n            case "+":\n            case "-":\n            case "*":\n            case "/":\n                return new Token(JsLexicalGrammar.MATHEMATICAL_OPERATOR, c1, input.getRange(start));\n            case "&":\n            case "|":\n            case "^":\n            case "~":\n                return new Token(JsLexicalGrammar.BITWISE_OPERATOR, c1, input.getRange(start));\n            case "=":\n                return new Token(JsLexicalGrammar.COMPARISON_OPERATOR, c1, input.getRange(start));\n            case "!":\n                return new Token(JsLexicalGrammar.LOGICAL_OPERATOR, c1, input.getRange(start));\n            case "<":\n            case ">":\n                return new Token(JsLexicalGrammar.COMPARISON_OPERATOR, c1, input.getRange(start));\n\n        }\n\n        // --- Fallback operator token ---\n        return Token.unexpected(c1, TextRange.around(input.getOffset()));\n    }\n}\n'`;
            // logger.ts

            setTimeout(() => {
                window.t = GlobalState.getTabsManager();
                window.Tab1 = new EditorTab("myJsFile", new EDoc(0, "let x = 1", JsLang.class));
                window.Tab2 = new EditorTab("myFile", new EDoc(0, "hello", null));
            }, 100);
        </script>
    </body>
</html>
